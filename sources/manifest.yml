---
# essenfont donor font registry.
#
# Each entry declares a font whose glyphs essenfont may pull.
# License is checked against the policy below. The build refuses to
# use anything outside the policy.
#
# Per-cp mapping comes from ucode's universal-set manifest at
# ../ucode/output/universal_glyph_set/manifest.json. This file only
# declares the donor registry.

ucd_version: "17.0.0"
essenfont_version: "0.1.0"
generated_at: "2026-06-29T00:00:00Z"

# License policy — governs what the build will accept.
#
# ofl_compatible_licenses: donors whose license lets the assembled
#   font be redistributed under OFL without additional restrictions.
#
# accepted_with_conditions: donors whose license permits
#   redistribution but imposes extra terms (more restrictive than
#   OFL) that survive into the output font. The build propagates
#   these extra terms to the output font's `name` table
#   (nameID 0 copyright + nameID 13 license description) and to the
#   auto-generated LICENSE-SOURCES.md, so downstream users can
#   honor them programmatically.
ofl_compatible_licenses:
  - OFL
  - Apache
  - MIT
  - BSD
  - CC0
  - UFL
  - Bitstream
  - GUST
  - CC-BY

accepted_with_conditions:
  - id: FSung-NC
    donor: "F.G. Wang — FSung (Full-Sung, Taiwan 全宋體)"
    restriction: no-commercial-use
    restriction_summary: "Commercial use of FSung-derived glyphs is prohibited. Academic research, educational work, and personal reading are permitted."
    statement: |
      現將此成果無條件分享出來，樂見學術研究、教育工作、個人閱讀這方面的運用，但請勿用做任何形式的商業營利行為。希望「全宋體」這個大型字庫以及「部件檢索」這個檢字工具，能在漢字文化的整理、研究上幫上一點小忙。
    applies_to: [fsung-m, fsung-2, fsung-3, fsung-x]

