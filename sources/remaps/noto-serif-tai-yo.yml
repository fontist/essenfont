# Remap table: NotoSerifTaiYo.ttf → Unicode Tai Yo (U+16E40..U+16E9F)
#
# NotoSerifTaiYo is the font used to render the Unicode Code Chart
# for Tai Yo, but encodes glyphs at non-standard PUA-like positions
# (U+15250..U+1527F and U+1E600..U+1E7FF) instead of the official
# Unicode 17 Tai Yo block. This table maps each PUA codepoint to its
# corresponding Unicode Tai Yo codepoint.
#
# Derivation: visual-match each glyph in NotoSerifTaiYo against the
# Unicode Code Chart for Tai Yo.
# Chart: https://www.unicode.org/charts/PDF/U-16E40.pdf
#
# STATUS: TODO — not yet derived. The donor entry in
# sources/manifest.yml is `enabled: false` until this table is filled
# in and the build supports `codepoint_remap:`.

